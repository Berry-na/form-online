<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="C:\Users\simob\Desktop\BLOG DRAMA\blog_giusto\styles\image.png">   
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&family=Story+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">

    <title>Sanremo</title>
  </head>
  <body>

  <div class="container">   
    <div class="fireworks-wrapper">
      <canvas id="canvas"></canvas>
      <h1 id="title">Classifica Sanremo</h1>
    </div>

    <div id="tabella">      
    </div>
  </div>
  
  <script src="https://unpkg.com/fireworks-js@2.x/dist/index.umd.js"></script>
  <script>
    const url = "https://script.google.com/macros/s/AKfycbxHncAoab_BAMp-7O_GLk3P3eMxLQ3rfxvL8M38qZDJ4qMic-RBTZiiKTT2FI7STe4gjw/exec";

    function carica() {
      fetch(url)
        .then(response => response.json())
        .then(dati => mostra(dati));
    }

    function mostra(dati) {
      let html = "";

      dati.forEach((riga,i)=>{
        if(riga[1] != 0){
          html += `
          <div class="domanda">
            <p>${riga[0]} - ${riga[1]} punti</p>
          </div>
        `;
        }
      });

      document.getElementById("tabella").innerHTML = html;
    }

    carica();
    setInterval(carica,2000);
  </script>
  <script src="script.js"></script>
  </body>
</html>
